<!doctype html>
<html>
    <head>
        <title>
            Rates
        </title>
        <script>
            document.addEventListener("DOMContentLoaded",function() {
                document.querySelector("form").onsubmit = function() {
                    fetch ("https://api.frankfurter.dev/v1/latest")
                    .then(response => response.json())
                    .then(data => {
                        const currency=document.querySelector("#currency").value.toUpperCase();
                        const rate = data.rates[currency];
                        if (rate !== undefined) {
                            document.querySelector("#answer").innerHTML = `1 EUR = ${rate} ${currency}`;
                        } else {
                            docuemnt.querySelector("#answer").innerHTML = "Undefined money name!";
                        }

                    });
                    return false;
                }
            });
        </script>

    </head>
    <body>
        <form>
            <input type="text" id="currency" name="currency" placeholder="USD">
            <input type="submit">
        </form>
        <div>
            <h1 id="answer">

            </h1>
        </div>

    </body>
</html>

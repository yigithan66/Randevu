{% extends "layout.html" %}
{% block content %}
<div class="card" style="max-width:420px; margin:0 auto;">
    <p class="card-title">İlk Kurulum</p>
    <p class="card-subtitle">Admin hesabınızı oluşturun.</p>

    <form autocomplete="off" action="/kurulum" method="post">
        <div class="form-group">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" name="username" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" name="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Hesabı Oluştur</button>
    </form>
</div>
{% endblock %}

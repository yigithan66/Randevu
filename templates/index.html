{% extends "layout.html" %}
{% block content %}
<script>
    let hours = {{ hours | tojson }};
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelector("#meet").addEventListener("change", function () {
            fetch(`/dolu_saatler?meet=${this.value}`)
                .then(response => response.json())
                .then(dolu => {
                    const container = document.querySelector("#hours");
                    container.replaceChildren();

                    hours.forEach(hour => {
                        let btn = document.createElement("button");
                        btn.type = "button";
                        btn.innerHTML = hour;
                        btn.className = "hour-btn";

                        if (dolu.includes(hour)) {
                            btn.disabled = true;
                        } else {
                            btn.onclick = function () {
                                document.querySelectorAll(".hour-btn").forEach(b => b.classList.remove("selected"));
                                this.classList.add("selected");
                                document.querySelector("#selected_hour").value = this.innerHTML;
                            };
                        }
                        container.appendChild(btn);
                    });
                });
        });

        document.querySelector("form").onsubmit = function (event) {
            if (document.querySelector("#selected_hour").value === "") {
                alert("Lütfen bir randevu saati seçiniz.");
                event.preventDefault();
                return false;
            }
        };
    });
</script>

<div class="card">
    <p class="card-title">Randevu Al</p>
    <p class="card-subtitle">Aşağıdaki formu doldurarak randevunuzu oluşturun.</p>

    <form autocomplete="off" action="/randevu" method="post">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="name">Ad</label>
                <input type="text" id="name" name="name" placeholder="Adınız" required>
            </div>
            <div class="form-group">
                <label for="surname">Soyad</label>
                <input type="text" id="surname" name="surname" placeholder="Soyadınız" required>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="phone">Telefon</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="5XX XXX XX XX" title="Başında sıfır olmadan 10 haneli numaranızı girin" required>
            <div class="form-group">
                <label for="service">Hizmet</label>
                <select name="service" id="service">
                    {% for service in services %}
                        <option value="{{ service }}">{{ service }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="meet">Tarih</label>
            <input type="date" id="meet" name="meet" min="{{ today }}" required>
        </div>

        <div class="form-group" id="hours-wrapper" style="min-height:48px;">
            <label>Saat Seçin</label>
            <div class="hours-grid" id="hours"></div>
            <p id="hours-hint" style="font-size:0.82rem; color:#999; margin-top:0.4rem;">Önce tarih seçin</p>
        </div>

        <input type="hidden" id="selected_hour" name="hours" value="">
        <button type="submit" class="btn-primary">Randevu Oluştur</button>
    </form>
</div>

<script>
    document.querySelector("#meet").addEventListener("change", function() {
        document.querySelector("#hours-hint").style.display = "none";
    });
</script>
{% endblock %}
